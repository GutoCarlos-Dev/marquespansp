<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/mobile-responsive.css" /> <!-- Adicionado para responsividade -->
</head>
<body>
    <header>
        <nav>
            <img src="../logo.png" alt="Logo" class="logo">
            <h1>Dashboard</h1>
            <div id="menu">
                <button onclick="window.location.href='dashboard.html'" style="background-color: #388E3C; color: white;">Dashboard</button>
                <button onclick="window.location.href='solicitacao.html'">Nova Solicitação</button>
                <button onclick="localStorage.removeItem('usuarioLogado'); window.location.href='../index.html'" class="btn-sair">Sair</button>
            </div>
            <button class="mobile-menu-toggle" onclick="document.getElementById('menu').classList.toggle('mobile-open')"></button>
        </nav>
    </header>
    <main>
        <div class="dashboard-header">
            <h2>Bem-vindo, <span id="nome-usuario"></span>!</h2>
            <p>Aqui está um resumo da sua atividade recente e do status das solicitações.</p>
        </div>
        
        <!-- Container principal do Dashboard -->
        <div id="dashboard-container">
            <!-- Cards de Resumo -->
            <div id="summary-cards" class="summary-cards">
                <!-- Cards serão gerados pelo JS -->
            </div>

            <!-- Gráficos -->
            <div id="charts-container" class="charts-container" style="display: none;">
                <div class="marquee-wrapper">
                    <div class="marquee-track" id="marqueeTrack">
                        <div id="status-chart-container" class="chart-card">
                            <h3>Status das Solicitações</h3>
                            <div class="chart-wrapper">
                                <canvas id="status-chart"></canvas>
                            </div>
                        </div>
                        <div id="status-count-chart-container" class="chart-card">
                            <h3>Quantidade por Status</h3>
                            <div class="chart-wrapper">
                                <canvas id="status-count-chart"></canvas>
                            </div>
                        </div>
                        <div id="bar-chart-container" class="chart-card">
                            <h3 id="bar-chart-title">Visão Geral</h3>
                            <div class="chart-wrapper">
                                <canvas id="bar-chart"></canvas>
                            </div>
                        </div>
                        <div id="top-pecas-chart-container" class="chart-card">
                            <h3>Top 10 Peças Mais Solicitadas</h3>
                            <div class="chart-wrapper">
                                <canvas id="top-pecas-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Grid de Atividade Recente -->
            <div id="recent-activity-container" class="recent-activity-grid">
                <h3>Atividade Recentes</h3>
                <table id="tabela-recente">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/mobile-menu.js"></script> <!-- Adicionado para o menu móvel -->
</body>
</html>
